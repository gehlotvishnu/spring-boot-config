# payment-service | sit environment
server.port=8080
server.servlet.context-path=/payment
spring.profiles.active=sit
spring.application.name=payment-service
management.endpoints.web.exposure.include=health,info,metrics
management.endpoint.health.show-details=when-authorized
logging.level.root=INFO
logging.level.com.example.payment=DEBUG
spring.datasource.url=jdbc:postgresql://postgres-sit.payment-service-sit.svc:5432/paymentdb
spring.datasource.username=payment_user
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false
payment.gateway.url=https://uat.payment-gateway.io/api
payment.gateway.timeout-ms=4000
payment.retry.max-attempts=3
payment.feature.upi-enabled=true
payment.feature.netbanking-enabled=true
