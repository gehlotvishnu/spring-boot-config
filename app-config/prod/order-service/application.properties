springConfig: |
  server.port=8080
  server.servlet.context-path=/orders
  spring.profiles.active=prod
  spring.application.name=order-service
  management.endpoints.web.exposure.include=health,metrics
  management.endpoint.health.show-details=never
  logging.level.root=WARN
  logging.level.com.example.order=INFO
  spring.datasource.url=jdbc:postgresql://postgres-prod.order-service-prod.svc:5432/orderdb
  spring.datasource.username=order_user
  spring.jpa.hibernate.ddl-auto=validate
  spring.jpa.show-sql=false
  spring.datasource.hikari.maximum-pool-size=15
  order.payment-service.url=http://payment-service.payment-service-prod.svc:8080/payment
  order.inventory-service.url=http://inventory-service.inventory-prod.svc:8080
  order.max-items-per-order=50
  order.feature.express-delivery=true
