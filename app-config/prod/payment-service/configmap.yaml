apiVersion: v1
kind: ConfigMap
metadata:
  name: payment-service-app-config
  namespace: payment-service-prod
  labels:
    app.kubernetes.io/name: payment-service
    config.owner: app-team
    environment: prod
data:
  application.properties: |
    server.port=8080
    server.servlet.context-path=/payment
    spring.profiles.active=prod
    spring.application.name=payment-service
    management.endpoints.web.exposure.include=health,metrics
    management.endpoint.health.show-details=never
    logging.level.root=WARN
    logging.level.com.example.payment=INFO
    spring.datasource.url=jdbc:postgresql://postgres-prod.payment-service-prod.svc:5432/paymentdb
    spring.datasource.username=payment_user
    spring.jpa.hibernate.ddl-auto=validate
    spring.jpa.show-sql=false
    spring.datasource.hikari.maximum-pool-size=20
    payment.gateway.url=https://api.payment-gateway.io/api
    payment.gateway.timeout-ms=3000
    payment.retry.max-attempts=3
    payment.feature.upi-enabled=true
    payment.feature.netbanking-enabled=true
