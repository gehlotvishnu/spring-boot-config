# =============================================================
# APP CONFIG  —  owned by Dev / Application team
# Edit the springConfig block below using standard Spring
# application.properties format (key=value).
# ArgoCD passes this to Helm which renders it into a ConfigMap
# mounted at /config/application.properties inside the pod.
# =============================================================
springConfig: |
  server.port=8080
  server.servlet.context-path=/payment
  spring.profiles.active=dev
  spring.application.name=payment-service
  management.endpoints.web.exposure.include=health,info,metrics,env
  management.endpoint.health.show-details=always
  logging.level.root=DEBUG
  logging.level.com.example.payment=DEBUG
  spring.datasource.url=jdbc:postgresql://postgres-dev.payment-service-dev.svc:5432/paymentdb
  spring.datasource.username=payment_user
  spring.jpa.hibernate.ddl-auto=update
  spring.jpa.show-sql=true
  payment.gateway.url=https://sandbox.payment-gateway.io/api
  payment.gateway.timeout-ms=5000
  payment.retry.max-attempts=3
  payment.feature.upi-enabled=true
  payment.feature.netbanking-enabled=true
