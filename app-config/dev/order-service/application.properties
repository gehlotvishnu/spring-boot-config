springConfig: |
  server.port=8081
  server.servlet.context-path=/orders
  spring.profiles.active=dev
  spring.application.name=order-service
  management.endpoints.web.exposure.include=health,info,metrics
  management.endpoint.health.show-details=always
  logging.level.root=DEBUG
  logging.level.com.example.order=DEBUG
  spring.datasource.url=jdbc:postgresql://postgres-dev.order-service-dev.svc:5432/orderdb
  spring.datasource.username=order_user
  spring.jpa.hibernate.ddl-auto=update
  spring.jpa.show-sql=true
  order.payment-service.url=http://payment-service.payment-service-dev.svc:8080/payment
  order.inventory-service.url=http://inventory-service.inventory-dev.svc:8080
  order.max-items-per-order=50
  order.feature.express-delivery=true
